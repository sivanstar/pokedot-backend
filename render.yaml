services:
  - type: web
    name: pokedot-api
    env: node
    buildCommand: npm install
    startCommand: node server-simple.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 1h
      - key: FRONTEND_URL
        value: https://pokedot.vercel.app
